# cronwatch example configuration
# Copy to config.yaml and adjust as needed.

check_interval: 60s

jobs:
  - name: daily-backup
    schedule: "0 2 * * *"
    max_runtime: 30m
    alert_after: 5m

  - name: hourly-cleanup
    schedule: "0 * * * *"
    max_runtime: 5m
    alert_after: 2m

alerts:
  webhook:
    url: "https://hooks.example.com/cronwatch"

  slack:
    webhook_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"

  email:
    smtp_host: "smtp.example.com"
    smtp_port: 587
    from: "cronwatch@example.com"
    to:
      - "ops@example.com"
    username: "cronwatch@example.com"
    password: "secret"

  pagerduty:
    integration_key: "your-pagerduty-integration-key"

  opsgenie:
    api_key: "your-opsgenie-api-key"

  victorops:
    routing_key: "your-victorops-routing-key"
    rest_endpoint: "https://alert.victorops.com/integrations/generic/..."

  teams:
    webhook_url: "https://outlook.office.com/webhook/..."

  discord:
    webhook_url: "https://discord.com/api/webhooks/..."

  telegram:
    bot_token: "your-telegram-bot-token"
    chat_id: "your-chat-id"

  gotify:
    url: "https://gotify.example.com"
    token: "your-gotify-token"
    priority: 5

  mattermost:
    webhook_url: "https://mattermost.example.com/hooks/your-token"
    channel: "#ops-alerts"
    username: "cronwatch"

history:
  path: "/var/lib/cronwatch/history.json"
  retention: 720h   # 30 days

api:
  listen: ":8080"
