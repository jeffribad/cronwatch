# cronwatch example configuration
# Copy to config.yaml and adjust as needed.

check_interval: 60s

jobs:
  - name: daily-backup
    schedule: "0 2 * * *"
    max_delay: 10m

  - name: hourly-sync
    schedule: "0 * * * *"
    max_delay: 5m

alerts:
  webhook:
    url: "https://hooks.example.com/notify"

  slack:
    webhook_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"

  email:
    smtp_host: "smtp.example.com"
    smtp_port: 587
    from: "cronwatch@example.com"
    to:
      - "ops@example.com"
    username: "cronwatch@example.com"
    password: "secret"

  pagerduty:
    routing_key: "your-pagerduty-routing-key"

  opsgenie:
    api_key: "your-opsgenie-api-key"

  victorops:
    routing_key: "your-victorops-routing-key"
    rest_endpoint_url: "https://alert.victorops.com/integrations/..."

  teams:
    webhook_url: "https://outlook.office.com/webhook/..."

  discord:
    webhook_url: "https://discord.com/api/webhooks/..."

  telegram:
    bot_token: "123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11"
    chat_id: "-1001234567890"

api:
  listen: ":8080"

retention:
  max_age: 720h   # 30 days
  purge_interval: 1h
